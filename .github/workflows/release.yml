name: Release and Publish to ClawHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    if: >
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore: release v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Decide version bump from commit message
        id: bump
        shell: bash
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%B)"
          echo "Latest commit message:"
          echo "$COMMIT_MSG"

          shopt -s nocasematch
          if [[ "$COMMIT_MSG" =~ BREAKING[[:space:]]CHANGE ]] || [[ "$COMMIT_MSG" =~ ^[a-z]+![:\(] ]]; then
            BUMP=major
          elif [[ "$COMMIT_MSG" =~ ^feat(\(.+\))?: ]]; then
            BUMP=minor
          else
            BUMP=patch
          fi
          shopt -u nocasematch

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Selected bump: $BUMP"

      - name: Bump version
        id: version
        shell: bash
        run: |
          NEW_VERSION="$(npm version "${{ steps.bump.outputs.bump }}" --no-git-tag-version)"
          NEW_VERSION="${NEW_VERSION#v}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Verify package tarball
        run: npm pack --dry-run

      - name: Commit version bump
        shell: bash
        run: |
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"

      - name: Create release tag
        shell: bash
        run: |
          git tag "v${{ steps.version.outputs.version }}"

      - name: Push release commit and tag
        shell: bash
        run: |
          git push origin main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Capture release commit SHA
        id: release_sha
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Login to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish package to ClawHub
        run: |
          clawhub package publish . \
            --source-repo https://github.com/emrekuruu/openclaw-job-search-plugin \
            --source-commit "${{ steps.release_sha.outputs.sha }}" \
            --source-ref "v${{ steps.version.outputs.version }}"